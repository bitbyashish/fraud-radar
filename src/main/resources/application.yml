spring:
  application:
    name: fraud-radar

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/fraudradar
    username: postgres
    password: fraudradar123

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: fraud-radar-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.fraudradar.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8080

jwt:
  secret: fraud-radar-super-secret-key-change-in-production-min-256-bits
  expiration: 86400000  # 24 hours in ms

fraud:
  scoring:
    low-threshold: 30
    medium-threshold: 60
    high-threshold: 80

logging:
  level:
    com.fraudradar: DEBUG
    org.springframework.kafka: INFO

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration